project_id = "gaming-library-dashboard"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[edge_runtime]
enabled = true
inspector_port = 8083

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "52428800"

[functions.normalize-games]
enabled = true
verify_jwt = false
import_map = "./functions/normalize-games/deno.json"
entrypoint = "./functions/normalize-games/index.ts"

[functions.sync-xbox]
enabled = true
verify_jwt = false
import_map = "./functions/sync-xbox/deno.json"
entrypoint = "./functions/sync-xbox/index.ts"

[functions.sync-psn]
enabled = true
verify_jwt = false
entrypoint = "./functions/sync-psn/index.ts"

[functions.sync-steam]
enabled = true
verify_jwt = false
entrypoint = "./functions/sync-steam/index.ts"

[functions.sync-nintendo]
enabled = true
verify_jwt = false
entrypoint = "./functions/sync-nintendo/index.ts"

[functions.auth-steam]
enabled = true
verify_jwt = false
import_map = "./functions/auth-steam/deno.json"
entrypoint = "./functions/auth-steam/index.ts"

[functions.auth-xbox]
enabled = true
verify_jwt = false
import_map = "./functions/auth-xbox/deno.json"
entrypoint = "./functions/auth-xbox/index.ts"

[functions.auth-nintendo]
enabled = true
verify_jwt = false
import_map = "./functions/auth-nintendo/deno.json"
entrypoint = "./functions/auth-nintendo/index.ts"

[functions.sync-all]
enabled = true
verify_jwt = false
entrypoint = "./functions/sync-all/index.ts"
